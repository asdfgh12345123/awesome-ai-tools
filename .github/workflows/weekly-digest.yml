name: Weekly Digest

on:
  schedule:
    - cron: '45 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate local digest
        run: python scripts/generate_digest.py

      - name: Commit digest if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add DIGEST_LATEST.md
            git commit -m "chore: update weekly digest [skip ci]"
            git push
          else
            echo "No digest updates"
          fi
