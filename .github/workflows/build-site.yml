name: Build Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Generate pages and stats
        run: |
          python scripts/build_site.py
          python scripts/generate_guides.py
          python scripts/generate_pricing_pages.py
          python scripts/generate_products.py
          python scripts/update_sitemap.py
          python scripts/generate_stats.py

      - name: Check local links
        run: python scripts/check_links.py

      - name: Remove files not needed for deployment
        shell: bash
        run: |
          rm -rf .git .github __pycache__ scripts data .gitignore .env .env.local

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
