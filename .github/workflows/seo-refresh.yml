name: SEO Refresh

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-generated-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate pages and stats
        run: |
          python scripts/build_site.py
          python scripts/generate_guides.py
          python scripts/generate_pricing_pages.py
          python scripts/generate_products.py
          python scripts/update_sitemap.py
          python scripts/generate_stats.py

      - name: Run link check
        run: python scripts/check_links.py

      - name: Commit updated assets if changed
        run: |
          if [ -n " M compare/index.html  M data/tools.json  M index.html ?? affiliate-disclosure/ ?? alternatives/ ?? data/affiliates.json ?? data/pricing.json ?? guides/cheapest-ai-coding-tools.html ?? guides/codex-vs-claude-code-vs-gemini-cli.html ?? guides/free-ai-tools-with-generous-limits.html ?? pricing/ ?? products/ ?? scripts/generate_pricing_pages.py ?? scripts/generate_products.py ?? tools/aider.html ?? tools/chatgpt.html ?? tools/claude.html ?? tools/continue.html ?? tools/cursor.html ?? tools/github-copilot.html ?? tools/midjourney.html ?? tools/ollama.html ?? tools/perplexity.html ?? tools/stable-diffusion.html" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: refresh generated site data [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
