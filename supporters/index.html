<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supporters - AI Tools Hub</title>
<style>
:root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8; --border: #334155; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); }
.container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
h1 { font-size: 2.5rem; text-align: center; color: #818cf8; margin-bottom: 10px; }
.subtitle { text-align: center; color: var(--muted); margin-bottom: 40px; }
.supporters { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
.supporter { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
.avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #4f46e5, #7c3aed); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; }
.supporter h3 { color: #818cf8; font-size: 1rem; margin-bottom: 5px; }
.tier { color: #10b981; font-size: 0.85rem; }
.cta { background: linear-gradient(135deg, #4f46e5, #7c3aed); border-radius: 16px; padding: 40px; text-align: center; margin: 40px 0; }
.cta h2 { color: white; margin-bottom: 10px; }
.cta p { color: #e0e7ff; margin-bottom: 20px; }
.cta a { background: white; color: #4f46e5; padding: 12px 24px; border-radius: 8px; display: inline-block; font-weight: 600; text-decoration: none; }
.nav { text-align: center; margin: 30px 0; }
.nav a { color: #818cf8; text-decoration: none; margin: 0 15px; }
</style>
</head>
<body>
<div class="container">
<h1>Our Supporters</h1>
<p class="subtitle">Thank you for keeping AI Tools Hub free!</p>
<div class="supporters">
<div class="supporter"><div class="avatar">&#x1F4AC;</div><h3>Be the first!</h3><p class="tier">Supporter</p></div>
</div>
<div class="cta"><h2>Support AI Tools Hub</h2><p>Help us keep 300+ resources free.</p>
<a href="https://ko-fi.com/aitoolshub">Buy Me a Coffee</a></div>
<div class="nav"><a href="../">Home</a><a href="../tools/">Tools</a><a href="../prompts/">Prompts</a></div>
</div>
</body>
</html>
